name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter_secret
          POSTGRES_DB: jobhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      ADMIN_API_KEY: test-api-key
      LLM_PROVIDER: ollama
      VECTOR_DB_PROVIDER: local
      EMAIL_PROVIDER: smtp
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
      PYTHONPATH: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements-shared.txt
          pip install -r backend/services/api/requirements.txt
          pip install -r backend/services/scraper/requirements.txt
          pip install -r backend/tests/requirements.txt
          pip install flake8 black

      - name: Lint (flake8)
        run: |
          flake8 backend/services/ backend/tests/ --max-line-length=120 --exclude=__pycache__ \
            --ignore=E501,W503

      - name: Run unit tests
        run: python -m pytest -c backend/pytest.ini backend/tests/unit/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest -c backend/pytest.ini backend/tests/integration/ -v --tb=short

      - name: Upload coverage
        if: always()
        run: |
          pip install pytest-cov
          python -m pytest -c backend/pytest.ini backend/tests/ --cov=services --cov-report=xml || true

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
