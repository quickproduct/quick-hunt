name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so gitleaks scans every commit, not just HEAD
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Dependency vulnerability audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements-shared.txt --strict || true  # report-only until baseline is clean
      - name: Static security analysis (bandit)
        # Gate on high-severity/high-confidence; medium findings are report-only
        # until the B608 text()-query baseline is reviewed.
        run: |
          pip install bandit
          bandit -r backend/services -lll -iii -x backend/tests
          bandit -r backend/services -ll -x backend/tests --exit-zero

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter_secret
          POSTGRES_DB: jobhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      ADMIN_API_KEY: test-api-key
      LLM_PROVIDER: ollama
      VECTOR_DB_PROVIDER: local
      EMAIL_PROVIDER: smtp
      CELERY_BROKER_URL: "memory://"
      CELERY_RESULT_BACKEND: "cache+memory://"
      PYTHONPATH: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r backend/requirements-shared.txt
          pip install -r backend/services/api/requirements.txt
          pip install -r backend/services/scraper/requirements.txt
          pip install -r backend/tests/requirements.txt
          pip install flake8 black

      - name: Lint (flake8)
        run: |
          flake8 backend/services/ backend/tests/ --max-line-length=120 --exclude=__pycache__ \
            --ignore=E501,W503

      - name: Run unit tests
        run: python -m pytest -c backend/pytest.ini backend/tests/unit/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest -c backend/pytest.ini backend/tests/integration/ -v --tb=short

      - name: Upload coverage
        if: always()
        run: |
          pip install pytest-cov
          python -m pytest -c backend/pytest.ini backend/tests/ --cov=services --cov-report=xml || true

      - uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # Run the real Alembic migrations against Postgres+pgvector. The unit/integration
  # tests above run on SQLite, so the raw-SQL pgvector paths (CREATE EXTENSION,
  # vector(768) column, HNSW index in migration 0011) are otherwise never exercised
  # in CI. This job catches migration/SQL drift before it reaches a deploy.
  migrations:
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: jobhunter
          POSTGRES_PASSWORD: jobhunter
          POSTGRES_DB: jobhunter
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://jobhunter:jobhunter@localhost:5432/jobhunter"
      PYTHONPATH: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install migration dependencies
        run: pip install -r backend/requirements-shared.txt

      - name: alembic upgrade head (Postgres + pgvector)
        run: alembic -c backend/alembic.ini upgrade head

      - name: alembic downgrade base then upgrade head (round-trip)
        run: |
          alembic -c backend/alembic.ini downgrade base
          alembic -c backend/alembic.ini upgrade head

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
          load: true          # load into the local daemon so Trivy can scan it
          tags: jh-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan API image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: jh-api:ci
          format: table
          exit-code: "1"            # fail the build on findings at the severities below
          ignore-unfixed: true      # don't fail on vulns with no upstream fix yet
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Build worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.worker
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
