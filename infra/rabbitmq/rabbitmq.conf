## RabbitMQ configuration
## ──────────────────────────────────────────────────────────────
## consumer_timeout controls how long (in ms) RabbitMQ waits for a
## consumer to acknowledge a message before closing its channel.
##
## Celery scraping tasks have a 30-minute soft time-limit (1800 s)
## and a 32-minute hard limit (1920 s).  The default RabbitMQ timeout
## of 1 800 000 ms (30 min) races with Celery's own soft limit and
## causes PRECONDITION-FATAL channel closures that kill workers.
##
## Set to 2 hours — well above the longest Celery task — so that
## only Celery's own time-limit machinery controls task lifecycle.
consumer_timeout = 7200000

## Memory back-pressure
## ──────────────────────────────────────────────────────────────
## On the shared 8 GB box RabbitMQ co-resides with Playwright scrapers
## and Postgres. Cap the broker at 40% of its (cgroup-limited) memory so
## it blocks publishers EARLY instead of letting a multi-thousand-message
## backlog accumulate — those backlogs are what trigger the KEDA scale-up
## storms that pin scrapers at 100% CPU. Producers back-pressure/retry
## (Celery broker_transport_options already retries publishes), which is
## the desired "slower but stays alive" behavior on a constrained node.
vm_memory_high_watermark.relative = 0.4