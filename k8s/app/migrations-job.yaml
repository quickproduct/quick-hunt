# One-shot Kubernetes Job: runs alembic upgrade head then exits.
# Apply before starting api or workers.
# Usage:
#   kubectl apply -f k8s/app/migrations-job.yaml
#   kubectl wait --for=condition=complete job/alembic-migrations -n job-hunter --timeout=300s
#   kubectl logs job/alembic-migrations -n job-hunter
apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migrations
  namespace: job-hunter
spec:
  ttlSecondsAfterFinished: 300  # Auto-delete pod after 5 min so it doesn't clutter
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo "waiting for postgres..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: alembic
          image: k3d-jh-registry:5050/jh-api:local
          imagePullPolicy: Always
          command:
            - alembic
            - -c
            - backend/alembic.ini
            - upgrade
            - head
          workingDir: /app
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
