apiVersion: v1
kind: ConfigMap
metadata:
  name: job-hunter-config
  namespace: job-hunter
data:
  # --- Environment ---
  ENVIRONMENT: "production"
  LOG_LEVEL: "WARNING"
  LOG_TO_FILE: "false"
  OTEL_SDK_DISABLED: "true"
  # Cap glibc malloc arenas. Default is 8 × CPU cores, which fragments heap memory
  # in multi-threaded Python workers (esp. the lxml/bs4 parsing in scraping +
  # enrichment) and inflates RSS that is never returned to the OS. 2 arenas keeps
  # RSS close to live-set size at negligible allocation-contention cost.
  MALLOC_ARENA_MAX: "2"

  # --- Database ---
  POSTGRES_DB: "jobhunter"
  POSTGRES_USER: "jobhunter"
  POSTGRES_LOCAL: "true"

  # --- RabbitMQ ---
  RABBITMQ_DEFAULT_USER: "jobhunter"

  # --- Celery / Worker ---
  # broker_pool_limit raised to 10 — no longer constrained by CloudAMQP free tier
  BROKER_POOL_LIMIT: "10"
  WORKER_PREFETCH_MULTIPLIER: "1"
  TASK_SOFT_TIME_LIMIT: "1800"
  TASK_TIME_LIMIT: "1920"
  TASK_ACKS_LATE: "true"
  TASK_REJECT_ON_WORKER_LOST: "true"

  # --- LLM ---
  LLM_PROVIDER: "groq"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  # Smaller/faster model for high-volume job scoring (reserves 70B + token
  # budget for cover letters). Empty = reuse GROQ_MODEL.
  GROQ_SCORING_MODEL: "llama-3.1-8b-instant"
  GROQ_RPM: "10"
  GROQ_TPM: "12000"

  # --- Embeddings ---
  OLLAMA_HOST: "http://ollama:11434"
  OLLAMA_EMBEDDING_MODEL: "nomic-embed-text"
  # pgvector: durable, process-safe, HNSW-indexed (migration 0011). "local" is
  # a JSON-file dev-only backend that is unsafe across worker processes.
  VECTOR_DB_PROVIDER: "pgvector"

  # --- Storage ---
  S3_ENDPOINT_URL: "https://8c0ae864a440df58cc578994a1e37d71.r2.cloudflarestorage.com"
  S3_BUCKET_NAME: "jobhunter-resumes"
  S3_REGION: "auto"

  # --- Email ---
  EMAIL_PROVIDER: "brevo"
  BREVO_FROM_EMAIL: "srshetty@surajshetty.online"
  BREVO_FROM_NAME: "Job Hunter"
  AUTO_SEND_ENABLED: "false"

  # --- Scraping ---
  RESPECT_ROBOTS_TXT: "true"
  DEFAULT_CRAWL_DELAY_SECONDS: "2"

  # --- Observability ---
  LANGFUSE_ENABLED: "false"
  LANGFUSE_HOST: "https://cloud.langfuse.com"
  LANGCHAIN_ENABLED: "true"

  # --- Frontend ---
  FRONTEND_URL: "http://localhost:3001"

  # --- Beat schedule intervals (seconds) ---
  BEAT_SCRAPE_INTERVAL: "7200"
  BEAT_REFRESH_COVERS_INTERVAL: "14400"
  BEAT_FILL_COVERS_INTERVAL: "300"
  BEAT_RETRY_SENDS_INTERVAL: "1800"
  BEAT_CLEANUP_INTERVAL: "604800"
