apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: job-hunter
  labels:
    app: redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - --maxmemory
            - "512mb"            # more headroom (pod limit is 1Gi) → eviction rarely triggers
            # volatile-lru, NOT allkeys-lru: this single Redis is shared by the cache,
            # Celery result backend, the Groq rate-limiter, cron locks, AND persistent
            # control-plane keys (admin:portal:*:enabled, feature flags) that have NO TTL.
            # Under allkeys-lru, cache pressure could evict those config keys and silently
            # re-enable portals/features. volatile-lru only evicts keys that carry a TTL
            # (all cache + result entries do), so the no-TTL control-plane keys are safe.
            # Next step if eviction pressure returns: split cache onto a separate Redis.
            - --maxmemory-policy
            - volatile-lru
            - --save
            - ""       # disable AOF/RDB persistence — result backend data is ephemeral
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "200m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: job-hunter
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None  # Headless — stable DNS: redis.job-hunter.svc.cluster.local
