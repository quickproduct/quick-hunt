# KEDA uses the RabbitMQ Management HTTP API (port 15672) to query queue depths.
#
# The secret rabbitmq-keda-secret must be created BEFORE applying this file.
# It is generated by local-setup.sh or deploy.sh from the real RabbitMQ password.
#
# To create manually:
#   PASS=$(kubectl get secret job-hunter-secrets -n job-hunter -o jsonpath='{.data.RABBITMQ_DEFAULT_PASS}' | base64 -d)
#   kubectl create secret generic rabbitmq-keda-secret -n job-hunter \
#     --from-literal=host="http://jobhunter:${PASS}@rabbitmq.job-hunter.svc.cluster.local:15672/" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# This file only contains the TriggerAuthentication (not the Secret itself —
# applying the Secret here would stomp the real credentials with CHANGE_ME).
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-trigger-auth-rabbitmq
  namespace: job-hunter
spec:
  secretTargetRef:
    - parameter: host
      name: rabbitmq-keda-secret
      key: host
