apiVersion: v1
kind: Namespace
metadata:
  name: job-hunter
  labels:
    app.kubernetes.io/managed-by: kubectl
    app.kubernetes.io/name: job-hunter
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: job-hunter-quota
  namespace: job-hunter
spec:
  hard:
    requests.memory: "16Gi"
    limits.memory: "40Gi"
    requests.cpu: "6000m"
    limits.cpu: "24000m"
    pods: "80"
