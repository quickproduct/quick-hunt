# Secret template — fill in real values before applying.
# NEVER commit this file with real values. Use: kubectl apply -f k8s/secrets/secrets.yaml
#
# Quickstart from your existing .env.prod:
#   kubectl create secret generic job-hunter-secrets \
#     --namespace job-hunter \
#     --from-env-file=infra/.env.prod \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: job-hunter-secrets
  namespace: job-hunter
type: Opaque
stringData:
  # --- Database ---
  POSTGRES_PASSWORD: "CHANGE_ME"
  DATABASE_URL: "postgresql+asyncpg://jobhunter:CHANGE_ME@postgres:5432/jobhunter"

  # --- Redis ---
  REDIS_URL: "redis://redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis:6379/1"

  # --- RabbitMQ ---
  RABBITMQ_DEFAULT_PASS: "CHANGE_ME"
  RABBITMQ_URL: "amqp://jobhunter:CHANGE_ME@rabbitmq:5672/"

  # --- Application ---
  ADMIN_API_KEY: "CHANGE_ME"
  SECRET_KEY: "CHANGE_ME"
  JWT_SECRET: "CHANGE_ME"

  # --- LLM ---
  GROQ_API_KEY: "CHANGE_ME"
  GROQ_API_KEYS: "CHANGE_ME"  # comma-separated for multi-key round-robin

  # --- Storage (Cloudflare R2) ---
  S3_ACCESS_KEY: "CHANGE_ME"
  S3_SECRET_KEY: "CHANGE_ME"

  # --- Email ---
  BREVO_API_KEY: "CHANGE_ME"
  BREVO_WEBHOOK_SECRET: "CHANGE_ME"

  # --- HR Email Discovery ---
  SNOV_CLIENT_ID: "CHANGE_ME"
  SNOV_CLIENT_SECRET: "CHANGE_ME"

  # --- Billing (optional) ---
  RAZORPAY_KEY_ID: "CHANGE_ME"
  RAZORPAY_KEY_SECRET: "CHANGE_ME"
  RAZORPAY_WEBHOOK_SECRET: "CHANGE_ME"

  # --- Observability (optional) ---
  LANGFUSE_PUBLIC_KEY: "CHANGE_ME"
  LANGFUSE_SECRET_KEY: "CHANGE_ME"

  # --- Dashboard (Next.js public vars must be set at build time, but list here for reference) ---
  NEXT_PUBLIC_ADMIN_API_KEY: "CHANGE_ME"
