# Rate-limited batch processor — NEVER more than 1 replica.
# Two instances would violate the GROQ_RPM rate limit, so the KEDA scaler
# below is capped at maxReplicaCount=1 (scales 0<->1 only).
# concurrency=1 + prefetch-multiplier=1 ensure strictly one task at a time.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cover-batch
  namespace: job-hunter
  labels:
    app: worker-cover-batch
    worker-type: cover-letter
    scaling-policy: fixed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-cover-batch
  strategy:
    type: Recreate  # No RollingUpdate — prevents even a brief two-pod window
  template:
    metadata:
      labels:
        app: worker-cover-batch
    spec:
      terminationGracePeriodSeconds: 1980
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo "waiting for redis..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-lightweight:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - --prefetch-multiplier=1
            - -Q
            - jh_cover_letter_batch
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --hostname=cover-batch@%h
          env:
            - name: SERVICE_NAME
              value: "worker-cover-batch"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "30m"
            limits:
              memory: "512Mi"
              cpu: "100m"
---
# Scale 0<->1 only. maxReplicaCount=1 preserves the single-instance
# invariant required by the GROQ_RPM rate limit; min=0 lets the pod
# sleep when the batch queue is empty (most of the time).
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-cover-batch-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-cover-batch
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 1
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_cover_letter_batch
        mode: QueueLength
        value: "10"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
