apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cover-bulk
  namespace: job-hunter
  labels:
    app: worker-cover-bulk
    worker-type: cover-letter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-cover-bulk
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-cover-bulk
    spec:
      terminationGracePeriodSeconds: 1980
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo "waiting for redis..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-lightweight:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - -Q
            - jh_cover_letter_bulk
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --max-tasks-per-child=100
            - --hostname=cover-bulk-%(n)s@%h
          env:
            - name: SERVICE_NAME
              value: "worker-cover-bulk"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "50m"
            limits:
              memory: "400Mi"
              cpu: "200m"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-cover-bulk-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-cover-bulk
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 2
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_cover_letter_bulk
        mode: QueueLength
        value: "10"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
