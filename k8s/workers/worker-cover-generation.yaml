# Hottest path — LLM + Ollama embeddings.
# Two KEDA triggers: KEDA scales to the MAX of both queue lengths.
# minReplicaCount=1 (local: 8GB RAM shared with playwright scrapers)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-cover-generation
  namespace: job-hunter
  labels:
    app: worker-cover-generation
    worker-type: cover-letter
spec:
  replicas: 1  # Matches minReplicaCount
  selector:
    matchLabels:
      app: worker-cover-generation
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-cover-generation
    spec:
      terminationGracePeriodSeconds: 1980
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo "waiting for redis..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-lightweight:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - -Q
            - jh_cover_letter_generation,jh_embeddings
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --max-tasks-per-child=50
            - --hostname=cover-generation-%(n)s@%h
          env:
            - name: SERVICE_NAME
              value: "worker-cover-generation"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "300Mi"
              cpu: "400m"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-cover-generation-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-cover-generation
  pollingInterval: 5  # Fast polling — hottest path in the system
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 2
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_cover_letter_generation
        mode: QueueLength
        value: "3"  # Aggressive: 1 pod per 3 messages
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_embeddings
        mode: QueueLength
        value: "3"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
