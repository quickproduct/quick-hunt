apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-email
  namespace: job-hunter
  labels:
    app: worker-email
    worker-type: email
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-email
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-email
    spec:
      terminationGracePeriodSeconds: 1980
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo "waiting for redis..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-lightweight:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - -Q
            - jh_email_send,jh_email_retry
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --max-tasks-per-child=200
            - --hostname=email-%(n)s@%h
          env:
            - name: SERVICE_NAME
              value: "worker-email"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          resources:
            requests:
              memory: "192Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "150m"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-email-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-email
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 2
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_email_send
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_email_retry
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
