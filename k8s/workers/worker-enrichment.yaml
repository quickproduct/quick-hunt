apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-enrichment
  namespace: job-hunter
  labels:
    app: worker-enrichment
    worker-type: scraping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-enrichment
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-enrichment
    spec:
      terminationGracePeriodSeconds: 1980
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "waiting for rabbitmq..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-lightweight:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - -Q
            - jh_scraping_enrichment
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            # Recycle the process more aggressively. HR-email discovery parses many
            # pages with lxml/bs4; lxml frees memory to glibc, which does not return
            # it to the OS, so RSS climbs to ~800Mi over a few hundred tasks. A lower
            # ceiling caps that growth (paired with MALLOC_ARENA_MAX in the configmap).
            - --max-tasks-per-child=50
            - --hostname=enrichment@%h
          env:
            - name: SERVICE_NAME
              value: "worker-enrichment"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          resources:
            requests:
              memory: "192Mi"
              cpu: "75m"
            limits:
              memory: "800Mi"
              cpu: "300m"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-enrichment-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-enrichment
  pollingInterval: 10
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 2
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_scraping_enrichment
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
