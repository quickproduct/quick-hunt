apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-scraping-bulk
  namespace: job-hunter
  labels:
    app: worker-scraping-bulk
    worker-type: scraping
spec:
  replicas: 1  # KEDA manages this — initial = minReplicaCount
  selector:
    matchLabels:
      app: worker-scraping-bulk
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-scraping-bulk
    spec:
      # Must be > task_time_limit (1920s) so in-flight tasks complete before SIGKILL
      terminationGracePeriodSeconds: 1980
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "waiting for rabbitmq..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi  # Playwright browser peaks at ~800MB SHM under load
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-playwright:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - -Q
            - jh_scraping_bulk
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --max-tasks-per-child=100
            - --hostname=scraping-bulk@%h
          env:
            - name: SERVICE_NAME
              value: "worker-scraping-bulk"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "320Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"  # Playwright peaks at 1-1.3GB process + 1GB SHM under real scraping
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["bash", "-c", "pgrep -f 'celery.*worker' > /dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scraping-bulk-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-scraping-bulk
  pollingInterval: 10
  cooldownPeriod: 300  # Playwright pods are expensive — scale down slowly
  minReplicaCount: 0
  maxReplicaCount: 1   # 8GB node; Playwright too heavy to run multiple instances
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_scraping_bulk
        mode: QueueLength
        value: "10"  # 1 pod per 10 queued messages
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
