apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-scraping-detail
  namespace: job-hunter
  labels:
    app: worker-scraping-detail
    worker-type: scraping
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-scraping-detail
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-scraping-detail
    spec:
      terminationGracePeriodSeconds: 240
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "waiting for rabbitmq..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-playwright:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --pool=threads
            - --concurrency=1
            - -Q
            - jh_scraping_detail
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --max-tasks-per-child=20
            - --hostname=scraping-detail-%(n)s@%h
          env:
            - name: SERVICE_NAME
              value: "worker-scraping-detail"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              # Observed steady-state ~240-300Mi; 512Mi requests were starving
              # the single-node scheduler during KEDA scale-up bursts.
              memory: "320Mi"
              cpu: "150m"
            limits:
              # Limit must also cover the 256Mi /dev/shm emptyDir above.
              # Detail tasks are HTTP-first with a thread-persistent browser
              # fallback and asset blocking, so the old per-page Chromium
              # launches (which OOMKilled this pod at 1280Mi) are gone.
              memory: "1Gi"
              # Chromium needs CPU headroom to finish JS-heavy detail pages
              # promptly — at 500m a single render starves the whole pod.
              cpu: "800m"
          livenessProbe:
            exec:
              command: ["bash", "-c", "pgrep -f 'celery.*worker' > /dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scraping-detail-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-scraping-detail
  pollingInterval: 5
  cooldownPeriod: 300
  minReplicaCount: 0
  # Raised 1 → 3 to drain the detail backlog (31k+ messages at ~0.2/s with a
  # single pod would take weeks). Node headroom verified before the bump.
  maxReplicaCount: 3
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_scraping_detail
        mode: QueueLength
        value: "25"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
