apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-scraping-mnc-company
  namespace: job-hunter
  labels:
    app: worker-scraping-mnc-company
    worker-type: scraping
spec:
  replicas: 0  # KEDA scales 0 → 3 based on queue depth (node-memory bound)
  selector:
    matchLabels:
      app: worker-scraping-mnc-company
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: worker-scraping-mnc-company
    spec:
      # Must be > task_time_limit (300s) so in-flight company scrapes finish.
      terminationGracePeriodSeconds: 360
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z rabbitmq 5672; do echo "waiting for rabbitmq..."; sleep 2; done']
          resources:
            requests:
              memory: "16Mi"
              cpu: "10m"
            limits:
              memory: "32Mi"
              cpu: "50m"
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi  # Playwright browser peaks at ~800MB SHM under load
      containers:
        - name: worker
          image: k3d-jh-registry:5050/jh-worker-playwright:local
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - services.scraper.celery_app
            - worker
            - --loglevel=warning
            - --concurrency=1
            - -Q
            - jh_scraping_mnc_company
            - -Ofair
            - -E
            - --without-mingle
            - --without-gossip
            - --max-tasks-per-child=20  # Recycle to release Playwright memory
            - --hostname=scraping-mnc-company@%h
          env:
            - name: SERVICE_NAME
              value: "worker-scraping-mnc-company"
          envFrom:
            - configMapRef:
                name: job-hunter-config
            - secretRef:
                name: job-hunter-secrets
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
          resources:
            requests:
              memory: "384Mi"
              cpu: "150m"
            limits:
              memory: "1100Mi"  # Per-company task is short; cap below scraping-realtime
              cpu: "800m"
          livenessProbe:
            exec:
              command: ["bash", "-c", "pgrep -f 'celery.*worker' > /dev/null"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-scraping-mnc-company-scaler
  namespace: job-hunter
spec:
  scaleTargetRef:
    name: worker-scraping-mnc-company
  pollingInterval: 5
  cooldownPeriod: 300
  idleReplicaCount: 0   # Scale fully to zero when queue is empty
  minReplicaCount: 0
  maxReplicaCount: 3
  triggers:
    - type: rabbitmq
      metadata:
        protocol: http
        queueName: jh_scraping_mnc_company
        mode: QueueLength
        value: "5"
      authenticationRef:
        name: keda-trigger-auth-rabbitmq
